<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grisa Engenharia — BIM Manager</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/pt.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b1220;--surf:#111c2d;--surf2:#172035;--border:#1e2e45;
  --accent:#00c2ff;--accent2:#1a6fd4;--silver:#9aa5b4;
  --text:#e8edf2;--muted:#4a5a6e;--danger:#ff5858;
}
html,body{height:100%}
body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.app{display:flex;min-height:100vh}

/* SIDEBAR TABS */
.sidebar-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.sidebar-tab{flex:1;padding:9px 0;background:transparent;border:none;font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;transition:all .15s;letter-spacing:.04em;border-bottom:2px solid transparent}
.sidebar-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.sidebar-tab:hover{color:var(--text)}

/* SIDEBAR */
.sidebar{width:240px;min-width:240px;background:var(--surf);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;position:sticky;top:0;overflow:hidden}
.brand{padding:18px 16px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0}
.brand-icon{width:36px;height:36px;border-radius:8px;background:linear-gradient(135deg,#1a6fd4,#00c2ff);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;color:#fff;flex-shrink:0}
.brand-name{font-size:14px;font-weight:800;letter-spacing:-0.02em;line-height:1.2}
.brand-sub{font-size:9px;font-family:'DM Mono',monospace;color:var(--accent);letter-spacing:.1em;text-transform:uppercase}
.sidebar-lbl{font-size:9px;font-family:'DM Mono',monospace;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;padding:12px 16px 5px;flex-shrink:0}
.proj-list{flex:1;overflow-y:auto}
.proj-item{display:flex;align-items:center;gap:8px;padding:9px 16px;cursor:pointer;border-left:2px solid transparent;transition:all .15s}
.proj-item:hover{background:var(--surf2)}
.proj-item.active{background:var(--surf2);border-left-color:var(--accent)}
.proj-dot{width:6px;height:6px;border-radius:50%;background:var(--muted);flex-shrink:0;transition:background .15s}
.proj-item.active .proj-dot{background:var(--accent)}
.proj-name{font-size:13px;font-weight:600;color:var(--silver);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:color .15s}
.proj-item.active .proj-name{color:var(--text)}
.sidebar-foot{padding:10px 16px 16px;border-top:1px solid var(--border);flex-shrink:0;display:flex;flex-direction:column;gap:6px}
.btn-new-proj{width:100%;padding:8px;background:transparent;border:1px dashed var(--border);color:var(--muted);font-family:'Syne',sans-serif;font-size:12px;font-weight:700;cursor:pointer;border-radius:7px;transition:all .2s;letter-spacing:.04em}
.btn-new-proj:hover{border-color:var(--accent);color:var(--accent)}
.btn-templates{width:100%;padding:8px;background:transparent;border:1px solid var(--border);color:var(--muted);font-family:'Syne',sans-serif;font-size:12px;font-weight:700;cursor:pointer;border-radius:7px;transition:all .2s;letter-spacing:.04em}
.btn-templates:hover{border-color:var(--accent);color:var(--accent)}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;min-height:100vh;overflow-x:hidden}
.topbar{padding:16px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg);position:sticky;top:0;z-index:50;flex-wrap:wrap;gap:10px}
.topbar h2{font-size:20px;font-weight:800;letter-spacing:-.03em}
.topbar-meta{font-size:11px;font-family:'DM Mono',monospace;color:var(--muted);margin-top:2px}
.topbar-right{display:flex;gap:8px;align-items:center;flex-wrap:wrap}

/* BUTTONS */
.btn{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;padding:8px 14px;border-radius:7px;border:none;cursor:pointer;letter-spacing:.04em;transition:all .15s;white-space:nowrap}
.btn-primary{background:linear-gradient(135deg,#1a6fd4,#00c2ff);color:#fff}
.btn-primary:hover{opacity:.85}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}
.btn-ghost:hover{color:var(--text);border-color:var(--silver)}
.btn-danger{background:transparent;color:var(--danger);border:1px solid var(--danger)}
.btn-danger:hover{background:var(--danger);color:#fff}
.btn-accent{background:rgba(0,194,255,.1);color:var(--accent);border:1px solid rgba(0,194,255,.3)}
.btn-accent:hover{background:rgba(0,194,255,.2)}
.btn-sm{padding:6px 11px;font-size:11px}

/* CONTENT */
.content{padding:22px 24px;display:flex;flex-direction:column;gap:26px}

/* STATS */
.stats{display:flex;gap:10px;flex-wrap:wrap}
.stat{flex:1;min-width:100px;background:var(--surf);border:1px solid var(--border);border-radius:10px;padding:13px 16px}
.stat-val{font-size:24px;font-weight:800;letter-spacing:-.04em;line-height:1;margin-bottom:3px}
.stat-val span{color:var(--accent)}
.stat-lbl{font-size:9px;font-family:'DM Mono',monospace;color:var(--muted);letter-spacing:.08em;text-transform:uppercase}

/* SECTION */
.sec-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.sec-tag{font-size:9px;font-family:'DM Mono',monospace;color:var(--accent);background:rgba(0,194,255,.08);border:1px solid rgba(0,194,255,.2);padding:3px 9px;border-radius:100px;letter-spacing:.1em;text-transform:uppercase;white-space:nowrap}
.sec-title{font-size:16px;font-weight:800;letter-spacing:-.02em}
.sec-line{flex:1;height:1px;background:var(--border)}

/* MATRIX */
.matrix-wrap{overflow-x:auto;border-radius:10px;border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:14px}
thead tr{background:var(--surf);border-bottom:2px solid var(--border)}
th{padding:13px 16px;text-align:left;font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:var(--silver);letter-spacing:.06em;text-transform:uppercase;white-space:nowrap}
th.tcol{text-align:center;border-left:1px solid var(--border);min-width:110px}
.th-inner{display:flex;align-items:center;justify-content:center;gap:5px}
.th-del{opacity:0;cursor:pointer;color:var(--danger);font-size:15px;background:none;border:none;padding:0;transition:opacity .15s;line-height:1}
th:hover .th-del{opacity:1}
tbody tr{border-bottom:1px solid var(--border);transition:background .12s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--surf2)}
td{padding:14px 16px;vertical-align:middle}
td.tcell{text-align:center;border-left:1px solid var(--border)}
.draw-code{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--accent);letter-spacing:.02em;margin-bottom:3px}
.draw-date{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);margin-bottom:5px}
.draw-actions{display:flex;gap:5px;flex-wrap:wrap}
.draw-btn{font-size:10px;padding:3px 8px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-family:'Syne',sans-serif;font-weight:600;transition:all .15s}
.draw-btn:hover{border-color:var(--accent);color:var(--accent)}
.draw-btn.del:hover{border-color:var(--danger);color:var(--danger)}

/* PENDENCIAS */
.pend-btn{background:none;border:1.5px solid var(--border);color:var(--muted);cursor:pointer;font-size:11px;font-weight:800;padding:2px 7px;border-radius:4px;font-family:'Syne',sans-serif;transition:all .15s;display:inline-flex;align-items:center;gap:4px;white-space:nowrap}
.pend-btn:hover{border-color:#f97316;color:#f97316}
.pend-btn.active{border-color:#f97316;color:#f97316;background:rgba(249,115,22,.1)}
.pend-count{background:#f97316;color:#fff;border-radius:100px;font-size:9px;font-weight:800;padding:1px 5px;line-height:1.4}
.pend-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:300;align-items:center;justify-content:center;padding:16px}
.pend-overlay.open{display:flex}
.pend-modal{background:var(--surf);border:1px solid var(--border);border-radius:12px;padding:24px;width:420px;max-width:100%;max-height:85vh;display:flex;flex-direction:column;gap:14px}
.pend-modal h3{font-size:15px;font-weight:800;letter-spacing:-.02em}
.pend-modal h4{font-size:11px;font-family:'DM Mono',monospace;color:var(--muted);letter-spacing:.08em;text-transform:uppercase}
.pend-list{display:flex;flex-direction:column;gap:6px;overflow-y:auto;max-height:240px}
.pend-item{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;background:var(--bg);border:1px solid var(--border);border-radius:8px;border-left:3px solid #f97316}
.pend-item-text{flex:1;font-size:13px;line-height:1.5;color:var(--text)}
.pend-item-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:0;transition:color .15s;flex-shrink:0;line-height:1}
.pend-item-del:hover{color:var(--danger)}
.pend-add-row{display:flex;gap:8px}
.pend-input{flex:1;padding:9px 12px;background:var(--bg);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:'Syne',sans-serif;font-size:13px;font-weight:600;outline:none;transition:border-color .15s}
.pend-input:focus{border-color:#f97316}
.pend-empty{font-size:12px;color:var(--muted);text-align:center;padding:16px;font-family:'DM Mono',monospace}

/* CHECKBOX */
.chk{width:24px;height:24px;border-radius:6px;border:2px solid var(--border);display:inline-flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;flex-shrink:0}
.chk:hover{border-color:var(--accent)}
.chk.on{background:linear-gradient(135deg,#1a6fd4,#00c2ff);border-color:transparent}
.chk.on::after{content:'';width:10px;height:6px;border-left:2.5px solid #fff;border-bottom:2.5px solid #fff;transform:rotate(-45deg) translateY(-1px);display:block}
.add-row{width:100%;padding:11px 16px;background:transparent;border:none;border-top:1px dashed var(--border);color:var(--muted);font-family:'Syne',sans-serif;font-size:12px;font-weight:600;cursor:pointer;text-align:left;transition:color .15s;display:flex;align-items:center;gap:7px}
.add-row:hover{color:var(--accent)}
.add-row::before{content:'+';font-size:16px}

/* BACKLOG */
.backlog-list{border:1px solid var(--border);border-radius:10px;overflow:hidden}
.bl-item{display:flex;align-items:center;gap:11px;padding:11px 16px;background:var(--surf);border-bottom:1px solid var(--border);transition:background .12s}
.bl-item:hover{background:var(--surf2)}
.bl-info{flex:1;display:flex;flex-direction:column;gap:3px}
.bl-text{font-size:14px;font-weight:600}
.bl-item.on .bl-text{text-decoration:line-through;color:var(--muted)}
.bl-date{font-size:11px;font-family:'DM Mono',monospace;color:var(--accent);letter-spacing:.04em}
.bl-actions{display:flex;gap:4px;opacity:0;transition:opacity .15s}
.bl-item:hover .bl-actions{opacity:1}
.bl-btn{background:none;border:1px solid var(--border);color:var(--muted);cursor:pointer;font-size:11px;padding:2px 7px;border-radius:4px;font-family:'Syne',sans-serif;font-weight:600;transition:all .15s}
.bl-btn:hover{border-color:var(--accent);color:var(--accent)}
.bl-btn.del:hover{border-color:var(--danger);color:var(--danger)}
.add-bl{width:100%;padding:11px 16px;background:var(--surf);border:none;border-top:1px dashed var(--border);color:var(--muted);font-family:'Syne',sans-serif;font-size:12px;font-weight:600;cursor:pointer;text-align:left;transition:color .15s;display:flex;align-items:center;gap:7px}
.add-bl:hover{color:var(--accent)}
.add-bl::before{content:'+';font-size:16px}

/* NOTES EDITOR */
.notes-wrap{border:1px solid var(--border);border-radius:10px;overflow:hidden}
.notes-hdr{padding:10px 16px;background:var(--surf);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.notes-hdr-label{font-size:9px;font-family:'DM Mono',monospace;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;flex:1}
.notes-toolbar{display:flex;gap:4px;align-items:center}
.ntb{background:transparent;border:1px solid var(--border);border-radius:5px;color:var(--muted);cursor:pointer;font-size:12px;padding:3px 8px;font-family:'Syne',sans-serif;font-weight:700;transition:all .15s;white-space:nowrap}
.ntb:hover{border-color:var(--accent);color:var(--accent)}
.ntb-sep{width:1px;height:16px;background:var(--border);margin:0 2px}
.notes-body{min-height:160px;padding:16px;background:var(--bg);outline:none;font-family:'DM Mono',monospace;font-size:13px;color:var(--silver);line-height:1.8;word-break:break-word}
.notes-body:empty::before{content:'Clique para escrever... Arraste ou cole imagens diretamente.';color:var(--muted);pointer-events:none}
.notes-body img{max-width:100%;border-radius:8px;margin:8px 0;display:block;border:1px solid var(--border)}
.notes-body b,.notes-body strong{color:var(--text);font-weight:700}
.notes-body h2{font-size:16px;font-weight:800;color:var(--text);margin:12px 0 6px;font-family:'Syne',sans-serif}
.notes-body ul{padding-left:20px;margin:6px 0}
.notes-drop-active{border-color:var(--accent)!important}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:200;align-items:center;justify-content:center;padding:16px}
.overlay.open{display:flex}
.modal{background:var(--surf);border:1px solid var(--border);border-radius:12px;padding:26px;width:440px;max-width:100%;max-height:90vh;overflow-y:auto}
.modal h3{font-size:16px;font-weight:800;margin-bottom:16px;letter-spacing:-.02em}
.field{margin-bottom:12px}
.field label{display:block;font-size:9px;font-family:'DM Mono',monospace;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:5px}
.field input,.field select{width:100%;padding:9px 12px;background:var(--bg);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:'Syne',sans-serif;font-size:13px;font-weight:600;outline:none;transition:border-color .15s}
.field input:focus,.field select:focus{border-color:var(--accent)}
.field select option{background:var(--surf)}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.field-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.date-input{cursor:pointer}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}

/* TEMPLATE MODAL */
.tpl-cols-list{display:flex;flex-direction:column;gap:6px;margin-bottom:10px;max-height:240px;overflow-y:auto}
.tpl-col-item{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--bg);border:1px solid var(--border);border-radius:7px}
.tpl-col-name{flex:1;font-size:13px;font-weight:600}
.tpl-col-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:0;transition:color .15s;line-height:1}
.tpl-col-del:hover{color:var(--danger)}
.tpl-add-row{display:flex;gap:8px}
.tpl-add-input{flex:1;padding:8px 12px;background:var(--bg);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:'Syne',sans-serif;font-size:13px;font-weight:600;outline:none}
.tpl-add-input:focus{border-color:var(--accent)}
.tpl-list{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.tpl-item{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bg);border:1px solid var(--border);border-radius:8px;cursor:pointer;transition:all .15s}
.tpl-item:hover{border-color:var(--accent)}
.tpl-item-name{flex:1;font-size:13px;font-weight:700}
.tpl-item-count{font-size:11px;font-family:'DM Mono',monospace;color:var(--muted)}
.tpl-item-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:0;transition:color .15s}
.tpl-item-del:hover{color:var(--danger)}
.tpl-apply-btn{background:rgba(0,194,255,.1);border:1px solid rgba(0,194,255,.3);color:var(--accent);font-family:'Syne',sans-serif;font-size:11px;font-weight:700;padding:4px 10px;border-radius:5px;cursor:pointer;transition:all .15s}
.tpl-apply-btn:hover{background:rgba(0,194,255,.2)}
.tpl-section-title{font-size:11px;font-family:'DM Mono',monospace;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px}

/* FLATPICKR */
.flatpickr-calendar{background:var(--surf)!important;border:1px solid var(--border)!important;border-radius:10px!important;box-shadow:0 8px 32px rgba(0,0,0,.5)!important}
.flatpickr-month,.flatpickr-weekdays,.flatpickr-day{color:var(--text)!important}
.flatpickr-prev-month,.flatpickr-next-month{fill:var(--silver)!important}
.flatpickr-day{border-radius:6px!important;color:var(--silver)!important}
.flatpickr-day:hover{background:var(--surf2)!important;border-color:var(--border)!important}
.flatpickr-day.selected{background:linear-gradient(135deg,#1a6fd4,#00c2ff)!important;border-color:transparent!important;color:#fff!important}
.flatpickr-day.today{border-color:var(--accent)!important;color:var(--accent)!important}
.flatpickr-weekday{color:var(--muted)!important;font-weight:700!important}
.flatpickr-monthDropdown-months{background:var(--surf)!important;color:var(--text)!important}
.numInputWrapper input{color:var(--text)!important}
.cur-month,.cur-year{color:var(--text)!important}

/* PROJECT CARDS HOME */
.home-header{padding:8px 0 20px;display:flex;align-items:center;justify-content:space-between}
.home-header h2{font-size:22px;font-weight:800;letter-spacing:-.03em}
.home-header p{font-size:12px;font-family:'DM Mono',monospace;color:var(--muted);margin-top:2px}
.proj-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.proj-card{background:var(--surf);border:1px solid var(--border);border-radius:12px;padding:18px 20px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.proj-card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:linear-gradient(180deg,#1a6fd4,#00c2ff)}
.proj-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.proj-card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px}
.proj-card-name{font-size:16px;font-weight:800;letter-spacing:-.02em;margin-bottom:3px}
.proj-card-code{font-size:10px;font-family:'DM Mono',monospace;color:var(--muted);letter-spacing:.08em}
.proj-card-status{font-size:9px;font-family:'DM Mono',monospace;padding:3px 8px;border-radius:100px;letter-spacing:.08em;text-transform:uppercase;flex-shrink:0}
.proj-card-status.ativo{background:rgba(0,194,255,.1);color:var(--accent);border:1px solid rgba(0,194,255,.2)}
.proj-card-status.concluido{background:rgba(74,222,128,.1);color:#4ade80;border:1px solid rgba(74,222,128,.2)}
.proj-card-dates{display:flex;gap:12px;margin-bottom:14px}
.proj-card-date{display:flex;flex-direction:column;gap:2px}
.proj-card-date-lbl{font-size:9px;font-family:'DM Mono',monospace;color:var(--muted);letter-spacing:.08em;text-transform:uppercase}
.proj-card-date-val{font-size:12px;font-family:'DM Mono',monospace;color:var(--silver)}
.proj-card-bar-bg{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-bottom:10px}
.proj-card-bar-fill{height:100%;background:linear-gradient(90deg,#1a6fd4,#00c2ff);border-radius:2px;transition:width .4s}
.proj-card-stats{display:flex;gap:14px}
.proj-card-stat{font-size:11px;font-family:'DM Mono',monospace;color:var(--muted)}
.proj-card-stat span{color:var(--text);font-weight:700}
.proj-card-pend{font-size:11px;font-family:'DM Mono',monospace;color:#f97316;font-weight:700}
.home-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:10px;color:var(--muted);text-align:center;grid-column:1/-1}

/* EMPTY / LOADING */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:10px;color:var(--muted);text-align:center}
.empty-icon{font-size:34px;opacity:.3}
.empty-title{font-size:15px;font-weight:700;color:var(--silver)}
.empty-sub{font-size:13px;line-height:1.6}
.spin-wrap{display:flex;align-items:center;justify-content:center;padding:50px}
.spinner{width:26px;height:26px;border-radius:50%;border:3px solid var(--border);border-top-color:var(--accent);animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* TOAST */
.toast{position:fixed;bottom:22px;right:22px;background:var(--surf);border:1px solid var(--border);border-radius:9px;padding:11px 16px;font-size:13px;font-weight:600;z-index:999;transform:translateY(60px);opacity:0;transition:all .3s;pointer-events:none}
.toast.show{transform:translateY(0);opacity:1}
.toast.ok{border-color:var(--accent);color:var(--accent)}
.toast.err{border-color:var(--danger);color:var(--danger)}

::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>
<body>
<div class="app">

  <!-- SIDEBAR -->
  <nav class="sidebar">
    <div class="brand" onclick="goHome()" style="cursor:pointer" title="Ir para início">
      <div class="brand-icon">GE</div>
      <div>
        <div class="brand-name">Grisa Engenharia</div>
        <div class="brand-sub">BIM Manager</div>
      </div>
    </div>
    <div class="sidebar-tabs">
      <button class="sidebar-tab active" id="tabAtivos" onclick="switchTab('ativo')">Ativos</button>
      <button class="sidebar-tab" id="tabConcluidos" onclick="switchTab('concluido')">Concluídos</button>
    </div>
    <div class="proj-list" id="projList"><div class="spin-wrap"><div class="spinner"></div></div></div>
    <div class="sidebar-foot">
      <button class="btn-new-proj" onclick="openModal('project')">+ Novo Projeto</button>
    </div>
  </nav>

  <!-- MAIN -->
  <main class="main">
    <div class="topbar">
      <div>
        <div style="display:flex;align-items:center;gap:8px">
          <h2 id="projTitle">Selecione um projeto</h2>
          <button id="editProjBtn" onclick="editProjName()" style="display:none;background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;padding:2px 4px;transition:color .15s" title="Editar nome">✏️</button>
        </div>
        <div class="topbar-meta" id="projMeta">—</div>
      </div>
      <div class="topbar-right" id="topActions" style="display:none">
        <button class="btn btn-ghost btn-sm" onclick="openModal('editProjDates')">📅 Datas</button>
        <button class="btn btn-ghost btn-sm" onclick="openTemplates()">📋 Modelos</button>
        <button class="btn btn-accent btn-sm" onclick="openModal('sequential')">⚡ Sequencial</button>
        <button class="btn btn-ghost btn-sm" onclick="openModal('column')">+ Coluna</button>
        <button class="btn btn-primary btn-sm" onclick="openModal('drawing')">+ Desenho</button>
        <button class="btn btn-ghost btn-sm" onclick="exportPDF()">🖨️ Imprimir</button>

        <div class="empty-icon">📐</div>
        <div class="empty-title">Nenhum projeto selecionado</div>
        <div class="empty-sub">Selecione ou crie um projeto na barra lateral.</div>
      </div>
    </div>
  </main>
</div>

<!-- MODAL GENÉRICO -->
<div class="overlay" id="overlay">
  <div class="modal">
    <h3 id="mTitle"></h3>
    <div id="mBody"></div>
    <div class="modal-btns" id="mBtns">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="confirmModal()">Confirmar</button>
    </div>
  </div>
</div>

<!-- MODAL TEMPLATES -->
<div class="overlay" id="tplOverlay">
  <div class="modal" style="width:500px">
    <h3>📋 Modelos de Matriz</h3>

    <div class="tpl-section-title">Modelos salvos</div>
    <div class="tpl-list" id="tplList">
      <div class="spin-wrap"><div class="spinner"></div></div>
    </div>

    <div style="border-top:1px solid var(--border);padding-top:16px;margin-top:4px">
      <div class="tpl-section-title">Criar novo modelo</div>
      <div class="field"><label>Nome do modelo</label><input id="tplName" placeholder="Ex: Padrão BIM Arquitetura"/></div>
      <div class="tpl-section-title" style="margin-top:8px">Colunas / Tarefas</div>
      <div class="tpl-cols-list" id="tplColsList"></div>
      <div class="tpl-add-row">
        <input class="tpl-add-input" id="tplColInput" placeholder="Nome da tarefa... pressione Enter" onkeydown="tplColEnter(event)"/>

    <div class="modal-btns">

</div>

<!-- MODAL PENDENCIAS -->

  <div class="pend-modal">
    <h3>⚠️ Pendências — <span id="pendTitle" style="color:#f97316"></span></h3>
    <h4>Pendências cadastradas</h4>
    <div class="pend-list" id="pendList"></div>
    <div>
      <h4 style="margin-bottom:8px">Nova pendência</h4>

        <input class="pend-input" id="pendInput" placeholder="Descreva a pendência..." onkeydown="if(event.key==='Enter') addPend()"/>

    </div>

</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
const SB_URL = 'https://sfmldcyhgobtrunnwgzu.supabase.co';
const SB_KEY = 'sb_publishable_F_iCLS0h7D78Vl1zV_UBFQ_Lv339sho';
const db = supabase.createClient(SB_URL, SB_KEY);

// STATE
let projects=[], activeProj=null;
let cols=[], draws=[], tasks={}, backlog=[], notes='', notesId=null;
let modalType=null, saveTimer=null;
let templates=[], tplNewCols=[];
let editingDrawId=null, editingBlId=null;
let pendencias={}, activePend={type:null,id:null};

// BOOT
async function boot() {
  try {
    const {data,error} = await db.from('projects').select('*').order('created_at');
    if (error) throw error;
    projects = data||[];
    renderSidebar();
    renderHome();
  } catch(e) {
    console.error(e);
    document.getElementById('projList').innerHTML=`
      <div style="padding:14px 16px">
        <div style="font-size:12px;color:var(--danger);font-weight:700;margin-bottom:6px">⚠️ Erro ao carregar</div>
        <div style="font-size:10px;font-family:'DM Mono',monospace;color:var(--muted);word-break:break-all;background:var(--bg);padding:8px;border-radius:6px;border:1px solid var(--border)">${e?.message||JSON.stringify(e)}</div>
        <button onclick="boot()" style="margin-top:10px;width:100%;padding:7px;background:transparent;border:1px solid var(--border);color:var(--muted);font-family:'Syne',sans-serif;font-size:12px;font-weight:700;cursor:pointer;border-radius:6px">↺ Tentar novamente</button>
      </div>`;
  }
}

let activeTab = 'ativo';

function switchTab(tab) {
  activeTab = tab;
  document.getElementById('tabAtivos').classList.toggle('active', tab==='ativo');
  document.getElementById('tabConcluidos').classList.toggle('active', tab==='concluido');
  renderSidebar();
}

// SIDEBAR
function renderSidebar() {
  const el = document.getElementById('projList');
  const filtered = projects.filter(p=>(p.status||'ativo')===activeTab);
  if (!filtered.length) {
    el.innerHTML=`<div style="padding:14px 16px;font-size:12px;color:var(--muted)">${activeTab==='ativo'?'Nenhum projeto ativo.':'Nenhum projeto concluído.'}</div>`;
    return;
  }
  el.innerHTML = filtered.map(p=>`
    <div class="proj-item ${activeProj?.id===p.id?'active':''}" onclick="loadProject('${p.id}')">
      <span class="proj-dot"></span>
      <span class="proj-name">${esc(p.name)}</span>
    </div>`).join('');
}

// HOME SCREEN
async function renderHome() {
  document.getElementById('projTitle').textContent = 'Início';
  document.getElementById('projMeta').textContent = `${projects.filter(p=>(p.status||'ativo')==='ativo').length} projetos ativos`;
  document.getElementById('topActions').style.display='none';
  document.getElementById('editProjBtn').style.display='none';

  // load stats for all projects
  let statsMap = {};
  if (projects.length) {
    const allPids = projects.map(p=>p.id);

    const [drRes, colRes, taskRes, blRes, pendRes] = await Promise.all([
      db.from('drawings').select('id,project_id').in('project_id', allPids),
      db.from('columns').select('id,project_id').in('project_id', allPids),
      db.from('tasks').select('drawing_id,done'),
      db.from('backlog').select('project_id,done').in('project_id', allPids),
      db.from('pendencias').select('ref_id'),
    ]);

    const drawings   = drRes.data||[];
    const columns    = colRes.data||[];
    const allTasks   = taskRes.data||[];
    const allBacklog = blRes.data||[];
    const allPends   = pendRes.data||[];

    // index drawings per project
    const drawsByProj = {};
    for (const d of drawings) {
      if (!drawsByProj[d.project_id]) drawsByProj[d.project_id]=[];
      drawsByProj[d.project_id].push(d.id);
    }

    // cols per project
    const colsByProj = {};
    for (const c of columns) {
      if (!colsByProj[c.project_id]) colsByProj[c.project_id]=0;
      colsByProj[c.project_id]++;
    }

    // tasks done per drawing
    const taskDoneByDraw = {};
    for (const t of allTasks) {
      if (!taskDoneByDraw[t.drawing_id]) taskDoneByDraw[t.drawing_id]=0;
      if (t.done) taskDoneByDraw[t.drawing_id]++;
    }

    // pends per drawing/backlog id
    const pendSet = new Set(allPends.map(p=>p.ref_id));

    for (const p of projects) {
      const dIds    = drawsByProj[p.id]||[];
      const numCols = colsByProj[p.id]||0;
      const total   = dIds.length * numCols;
      const done    = dIds.reduce((a,did)=>a+(taskDoneByDraw[did]||0),0);
      const pct     = total>0?Math.round(done/total*100):0;
      const blPend  = (allBacklog.filter(b=>b.project_id===p.id&&!b.done)).length;
      // count pendencias for this project's drawings + backlog
      const pendCount = [...dIds].filter(id=>pendSet.has(id)).length +
        allBacklog.filter(b=>b.project_id===p.id&&pendSet.has(b.id)).length;
      // actually count all pend entries not just refs
      const pendTotal = allPends.filter(pd=>dIds.includes(pd.ref_id)||allBacklog.some(b=>b.project_id===p.id&&b.id===pd.ref_id)).length;

      statsMap[p.id] = { draws: dIds.length, total, done, pct, blPend, pendTotal };
    }
  }

  const ativos    = projects.filter(p=>(p.status||'ativo')==='ativo');
  const concluidos = projects.filter(p=>p.status==='concluido');

  const cardHTML = (list) => {
    if (!list.length) return `<div class="home-empty"><div style="font-size:30px;opacity:.3">📁</div><div style="font-size:14px;font-weight:700;color:var(--silver)">Nenhum projeto aqui</div></div>`;
    return list.map(p=>{
      const s = statsMap[p.id]||{draws:0,total:0,done:0,pct:0,blPend:0,pendTotal:0};
      return `
      <div class="proj-card" onclick="loadProject('${p.id}')">
        <div class="proj-card-top">
          <div>
            <div class="proj-card-name">${esc(p.name)}</div>
            <div class="proj-card-code">${p.code||'Sem código'}</div>
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
            <span class="proj-card-status ${p.status||'ativo'}">${p.status==='concluido'?'Concluído':'Ativo'}</span>
            ${p.status!=='concluido'?`<button onclick="event.stopPropagation();concluirProject('${p.id}')" style="font-size:10px;padding:2px 8px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-family:'Syne',sans-serif;font-weight:600;transition:all .15s" onmouseover="this.style.borderColor='#4ade80';this.style.color='#4ade80'" onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--muted)'">✓ Concluir</button>`:''}
          </div>
        </div>
        <div class="proj-card-dates">
          <div class="proj-card-date">
            <span class="proj-card-date-lbl">Início</span>
            <span class="proj-card-date-val">${p.start_date?fmtDate(p.start_date):'—'}</span>
          </div>
          <div class="proj-card-date">
            <span class="proj-card-date-lbl">Término</span>
            <span class="proj-card-date-val">${p.end_date?fmtDate(p.end_date):'—'}</span>
          </div>
        </div>
        <div class="proj-card-bar-bg"><div class="proj-card-bar-fill" style="width:${s.pct}%"></div></div>
        <div class="proj-card-stats">
          <span class="proj-card-stat"><span>${s.draws}</span> desenhos</span>
          <span class="proj-card-stat"><span>${s.done}/${s.total}</span> tarefas</span>
          <span class="proj-card-stat"><span>${s.pct}%</span> progresso</span>
          <span class="proj-card-stat"><span>${s.blPend}</span> backlog</span>
          ${s.pendTotal>0?`<span class="proj-card-pend">⚠ ${s.pendTotal} pendência${s.pendTotal!==1?'s':''}</span>`:''}
        </div>
      </div>`;}).join('');
  };

  document.getElementById('content').innerHTML=`
    <div class="home-header">
      <div>
        <h2>Projetos Ativos</h2>
        <p>${ativos.length} ativo${ativos.length!==1?'s':''} · ${concluidos.length} concluído${concluidos.length!==1?'s':''}</p>
      </div>
      <button class="btn btn-primary btn-sm" onclick="openModal('project')">+ Novo Projeto</button>
    </div>
    <div class="proj-cards">${cardHTML(ativos)}</div>
    ${concluidos.length?`
    <div class="home-header" style="margin-top:24px">
      <div><h2 style="font-size:18px">Projetos Concluídos</h2></div>
    </div>
    <div class="proj-cards">${cardHTML(concluidos)}</div>`:''}
  `;
}

function goHome() {
  activeProj = null;
  renderSidebar();
  renderHome();
}

// LOAD PROJECT
async function loadProject(id) {
  activeProj = projects.find(p=>p.id===id);
  renderSidebar();
  document.getElementById('content').innerHTML=`<div class="spin-wrap"><div class="spinner"></div></div>`;
  document.getElementById('projTitle').textContent = activeProj.name;
  document.getElementById('projMeta').textContent = activeProj.code||'Sem código';
  document.getElementById('topActions').style.display='flex';
  document.getElementById('editProjBtn').style.display='inline';
  const pid = activeProj.id;
  try {
    const [cR,dR,bR,nR] = await Promise.all([
      db.from('columns').select('*').eq('project_id',pid).order('position'),
      db.from('drawings').select('*').eq('project_id',pid).order('position'),
      db.from('backlog').select('*').eq('project_id',pid).order('created_at'),
      db.from('notes').select('*').eq('project_id',pid).maybeSingle(),
    ]);
    cols  = cR.data||[];
    draws = dR.data||[];
    backlog = bR.data||[];
    notes   = nR.data?.content||'';
    notesId = nR.data?.id||null;
    tasks={};
    if (draws.length) {
      const {data:t} = await db.from('tasks').select('*').in('drawing_id', draws.map(d=>d.id));
      for (const tk of (t||[])) {
        if (!tasks[tk.drawing_id]) tasks[tk.drawing_id]={};
        tasks[tk.drawing_id][tk.column_id]=tk;
      }
    }
    // load pendencias
    pendencias={};
    const allIds=[...draws.map(d=>d.id),...backlog.map(b=>b.id)];
    if (allIds.length) {
      const {data:pds} = await db.from('pendencias').select('*').in('ref_id', allIds).order('created_at');
      for (const p of (pds||[])) {
        if (!pendencias[p.ref_id]) pendencias[p.ref_id]=[];
        pendencias[p.ref_id].push(p);
      }
    }
    renderAll();
  } catch(e) { toast('Erro ao carregar projeto','err'); console.error(e); }
}

// RENDER ALL
function renderAll() {
  const p = activeProj;
  const total = draws.length*cols.length;
  const done  = Object.values(tasks).reduce((a,m)=>a+Object.values(m).filter(t=>t.done).length,0);
  const pend  = backlog.filter(b=>!b.done).length;
  const pct   = total>0?Math.round(done/total*100):0;
  const totalPends = Object.values(pendencias).reduce((a,arr)=>a+arr.length,0);
  document.getElementById('projMeta').textContent=`${p.code||'Sem código'} · ${draws.length} desenho${draws.length!==1?'s':''}`;
  document.getElementById('content').innerHTML=`
    <div class="stats">
      <div class="stat"><div class="stat-val">${draws.length}</div><div class="stat-lbl">Desenhos</div></div>
      <div class="stat"><div class="stat-val">${done}<span>/${total}</span></div><div class="stat-lbl">Tarefas feitas</div></div>
      <div class="stat"><div class="stat-val">${pend}</div><div class="stat-lbl">Backlog pendente</div></div>
      <div class="stat"><div class="stat-val" style="color:var(--accent)">${pct}<span style="font-size:15px">%</span></div><div class="stat-lbl">Progresso</div></div>
      <div class="stat"><div class="stat-val" style="color:${totalPends>0?'#f97316':'var(--muted)'}">${totalPends}</div><div class="stat-lbl">Pendências</div></div>
    </div>
    <div>
      <div class="sec-header"><span class="sec-tag">Matriz</span><span class="sec-title">Desenhos × Tarefas</span><div class="sec-line"></div></div>
      ${buildMatrix()}
    </div>
    <div>
      <div class="sec-header"><span class="sec-tag">Backlog</span><span class="sec-title">Tarefas Gerais</span><div class="sec-line"></div></div>
      ${buildBacklog()}
    </div>
    <div>
      <div class="sec-header"><span class="sec-tag">Notas</span><span class="sec-title">Informações do Projeto</span><div class="sec-line"></div></div>
      <div class="notes-wrap" id="notesWrap">
        <div class="notes-hdr">
          <span class="notes-hdr-label">Anotações · salvo automaticamente</span>
          <div class="notes-toolbar">
            <button class="ntb" onclick="fmt('bold')"><b>B</b></button>
            <button class="ntb" onclick="fmt('italic')"><i>I</i></button>
            <button class="ntb" onclick="fmt('insertUnorderedList')">☰</button>
            <div class="ntb-sep"></div>
            <button class="ntb" onclick="insertImg()">📎 Imagem</button>
            <div class="ntb-sep"></div>
            <button class="ntb" onclick="clearNotes()" style="color:var(--danger);border-color:var(--danger)">🗑️ Limpar</button>
          </div>
        </div>
        <div class="notes-body" id="notesEl" contenteditable="true" oninput="schedSave()" onpaste="handlePaste(event)" ondragover="handleDragOver(event)" ondrop="handleDrop(event)" ondragleave="handleDragLeave(event)">${notes}</div>
      </div>
    </div>
  `;
}

function buildMatrix() {
  if (!cols.length&&!draws.length) return `<div class="empty"><div class="empty-icon">📋</div><div class="empty-title">Matriz vazia</div><div class="empty-sub">Use "+ Coluna" e "+ Desenho" para começar.<br>Ou aplique um modelo em "📋 Modelos de Matriz".</div></div>`;
  const thead=`<thead><tr>
    <th>Desenho</th>
    ${cols.map(c=>`<th class="tcol"><div class="th-inner">${esc(c.name)}<button class="th-del" onclick="delCol('${c.id}')">×</button></div></th>`).join('')}
  </tr></thead>`;
  const tbody=draws.length?`<tbody>${draws.map(d=>{
    const pds=pendencias[d.id]||[];
    const hasPend=pds.length>0;
    return `<tr id="draw-row-${d.id}">
      <td>
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:3px">
          <div class="draw-code">${esc(d.code)}</div>
          <button class="pend-btn ${hasPend?'active':''}" onclick="openPend('drawing','${d.id}','${esc(d.code)}')" title="Pendências">!${hasPend?`<span class="pend-count">${pds.length}</span>`:''}</button>
        </div>
        ${d.due_date?`<div class="draw-date">📅 ${fmtDate(d.due_date)}</div>`:''}
        <div class="draw-actions">
          <button class="draw-btn" onclick="editDraw('${d.id}')">✏️ Editar</button>
          <button class="draw-btn del" onclick="delDraw('${d.id}')">Remover</button>
        </div>
      </td>
      ${cols.map(c=>{
        const t=tasks[d.id]?.[c.id];
        return `<td class="tcell"><div class="chk ${t?.done?'on':''}" onclick="toggleTask('${d.id}','${c.id}','${t?.id||''}',${t?.done||false})"></div></td>`;
      }).join('')}
    </tr>`;}).join('')}</tbody>`:'' ;
  return `<div class="matrix-wrap"><table>${thead}${tbody}</table><button class="add-row" onclick="openModal('drawing')">Adicionar desenho</button></div>`;
}

function buildBacklog() {
  const items=backlog.map(b=>{
    const pds=pendencias[b.id]||[];
    const hasPend=pds.length>0;
    return `<div class="bl-item ${b.done?'on':''}" id="bl-item-${b.id}">
      <div class="chk ${b.done?'on':''}" onclick="toggleBL('${b.id}',${b.done})"></div>
      <div class="bl-info">
        <div style="display:flex;align-items:center;gap:8px">
          <span class="bl-text">${esc(b.text)}</span>
          <button class="pend-btn ${hasPend?'active':''}" onclick="openPend('backlog','${b.id}','${esc(b.text)}')" title="Pendências">!${hasPend?`<span class="pend-count">${pds.length}</span>`:''}</button>
        </div>
        ${b.due_date?`<span class="bl-date">📅 ${fmtDate(b.due_date)}</span>`:''}
      </div>
      <div class="bl-actions">
        <button class="bl-btn" onclick="editBL('${b.id}')">✏️</button>
        <button class="bl-btn del" onclick="delBL('${b.id}')">×</button>
      </div>
    </div>`;}).join('');
  return `<div class="backlog-list">${items}<button class="add-bl" onclick="openModal('backlog')">Adicionar tarefa</button></div>`;
}

// TASK TOGGLE
async function toggleTask(drawId,colId,taskId,wasDone) {
  if (taskId) {
    await db.from('tasks').update({done:!wasDone}).eq('id',taskId);
    tasks[drawId][colId].done=!wasDone;
  } else {

  }
  renderAll();
}

function embedImage(file) {
  const r=new FileReader();

}
function handlePaste(e) { const items=e.clipboardData?.items; if (!items) return; for (const item of items) { if (item.type.startsWith('image/')) { e.preventDefault(); embedImage(item.getAsFile()); return; } } }
function handleDragOver(e) { e.preventDefault(); document.getElementById('notesWrap')?.classList.add('notes-drop-active'); }

function handleDrop(e) { e.preventDefault(); document.getElementById('notesWrap')?.classList.remove('notes-drop-active'); const f=e.dataTransfer?.files[0]; if (f&&f.type.startsWith('image/')) embedImage(f); }

function openModal(type) {
  modalType=type;
  const def=modalDefs[type];
  document.getElementById('mTitle').textContent=def.title;
  document.getElementById('mBody').innerHTML=def.body;
  document.getElementById('overlay').classList.add('open');
  setTimeout(()=>{
    document.getElementById('f1')?.focus();
    ['f2','f5'].forEach(id=>{ const el=document.getElementById(id); if (el&&el.classList.contains('date-input')) initDatePicker(id); });
    ['f3','f4'].forEach(id=>{ const el=document.getElementById(id); if (el&&el.classList.contains('date-input')) {
      const defaultVal = type==='editProjDates'
        ? (id==='f3'?activeProj?.start_date:activeProj?.end_date)||''
        : '';
      initDatePicker(id, defaultVal);
    }});
    if (type==='sequential') {
      ['f1','f3','f4'].forEach(id=>document.getElementById(id)?.addEventListener('input',updateSeqPreview));
    }
  },80);
}

function initDatePicker(id, defaultDate='') {
  const el=document.getElementById(id);
  if (!el) return;
  flatpickr(el,{locale:'pt',dateFormat:'Y-m-d',altInput:true,altFormat:'d/m/Y',disableMobile:false,allowInput:false,defaultDate:defaultDate||undefined});
}

function updateSeqPreview() {
  const prefix=(document.getElementById('f1')?.value||'').trim();
  const qty   =parseInt(document.getElementById('f3')?.value)||0;
  const start =parseInt(document.getElementById('f4')?.value)||1;
  const prev  =document.getElementById('seqPreview');
  if (!prev) return;
  if (!prefix||!qty) { prev.style.display='none'; return; }
  const examples=[];
  for (let i=start;i<start+Math.min(qty,4);i++) examples.push(`${prefix}.${String(i).padStart(3,'0')}`);
  const more=qty>4?` ... ${prefix}.${String(start+qty-1).padStart(3,'0')}`:'';
  prev.style.display='block';
  prev.textContent=`Prévia: ${examples.join(', ')}${more} (${qty} desenhos)`;
}

function closeModal() { document.getElementById('overlay').classList.remove('open'); modalType=null; editingDrawId=null; editingBlId=null; }

async function confirmModal() {
  const f1=document.getElementById('f1')?.value?.trim();
  const f2=document.getElementById('f2')?.value?.trim();
  if (!f1&&modalType!=='sequential') { toast('Preencha o campo obrigatório','err'); return; }
  const pid=activeProj?.id;

  try {
    if (modalType==='editProjDates') {
      const f3=document.getElementById('f3')?.value?.trim();
      const f4=document.getElementById('f4')?.value?.trim();
      await db.from('projects').update({start_date:f3||null,end_date:f4||null}).eq('id',activeProj.id);
      activeProj.start_date=f3||null;
      activeProj.end_date=f4||null;
      const p=projects.find(x=>x.id===activeProj.id);
      if(p){p.start_date=f3||null;p.end_date=f4||null;}
      toast('Datas atualizadas!','ok');
      closeModal(); return;
    }
      const f3=document.getElementById('f3')?.value?.trim();
      const f4=document.getElementById('f4')?.value?.trim();
      const {data:p,error:pe}=await db.from('projects').insert({name:f1,code:f2||null,start_date:f3||null,end_date:f4||null,status:'ativo'}).select().single();
      if (pe||!p) { toast('Erro: '+(pe?.message||'?'),'err'); return; }
      projects.push(p); renderSidebar(); closeModal(); await loadProject(p.id); toast('Projeto criado!','ok'); return;
    }

    if (modalType==='drawing') {
      const {data:d}=await db.from('drawings').insert({project_id:pid,code:f1,due_date:f2||null,position:draws.length}).select().single();
      draws.push(d);
      if (cols.length) {
        const {data:ts}=await db.from('tasks').insert(cols.map(c=>({drawing_id:d.id,column_id:c.id,done:false}))).select();
        tasks[d.id]={};
        for (const t of (ts||[])) tasks[d.id][t.column_id]=t;
      } else tasks[d.id]={};
      toast('Desenho adicionado!','ok');
    }

    if (modalType==='editDraw') {
      await db.from('drawings').update({code:f1,due_date:f2||null}).eq('id',editingDrawId);
      const d=draws.find(x=>x.id===editingDrawId);
      if (d) { d.code=f1; d.due_date=f2||null; }
      toast('Desenho atualizado!','ok');
    }

    if (modalType==='column') {
      const exists = cols.some(c => c.name.toLowerCase() === f1.toLowerCase());
      if (exists) { toast(`Coluna "${f1}" já existe neste projeto`,'err'); return; }
      const {data:c}=await db.from('columns').insert({project_id:pid,name:f1,position:cols.length}).select().single();
      cols.push(c);
      if (draws.length) {
        const {data:ts}=await db.from('tasks').insert(draws.map(d=>({drawing_id:d.id,column_id:c.id,done:false}))).select();
        for (const t of (ts||[])) { if (!tasks[t.drawing_id]) tasks[t.drawing_id]={}; tasks[t.drawing_id][t.column_id]=t; }
      }
      toast('Coluna adicionada!','ok');
    }

    if (modalType==='backlog') {
      const {data:b}=await db.from('backlog').insert({project_id:pid,text:f1,due_date:f2||null}).select().single();
      backlog.push(b); toast('Tarefa adicionada!','ok');
    }

    if (modalType==='editBacklog') {
      await db.from('backlog').update({text:f1,due_date:f2||null}).eq('id',editingBlId);
      const b=backlog.find(x=>x.id===editingBlId);
      if (b) { b.text=f1; b.due_date=f2||null; }
      toast('Tarefa atualizada!','ok');
    }

    if (modalType==='sequential') {
      const prefix=(document.getElementById('f1')?.value||'').trim();
      const qty   =parseInt(document.getElementById('f3')?.value)||0;
      const start =parseInt(document.getElementById('f4')?.value)||1;
      const date  =document.getElementById('f5')?.value?.trim()||null;
      if (!prefix||!qty) { toast('Preencha prefixo e quantidade','err'); return; }
      const newDraws=[];
      for (let i=start;i<start+qty;i++) {
        newDraws.push({project_id:pid,code:`${prefix}.${String(i).padStart(3,'0')}`,due_date:date||null,position:draws.length+i-start});
      }
      const {data:inserted}=await db.from('drawings').insert(newDraws).select();
      draws.push(...(inserted||[]));
      if (cols.length&&inserted?.length) {
        const taskInserts=[];
        for (const d of inserted) for (const c of cols) taskInserts.push({drawing_id:d.id,column_id:c.id,done:false});
        const {data:ts}=await db.from('tasks').insert(taskInserts).select();
        for (const t of (ts||[])) { if (!tasks[t.drawing_id]) tasks[t.drawing_id]={}; tasks[t.drawing_id][t.column_id]=t; }
        for (const d of inserted) if (!tasks[d.id]) tasks[d.id]={};
      }
      toast(`${qty} desenhos adicionados!`,'ok');
    }

    closeModal();
    renderAll();
  } catch(e) { toast('Erro ao salvar','err'); console.error(e); }
}

async function applyTemplate(id) {
  if (!activeProj) { toast('Selecione um projeto primeiro','err'); return; }
  const tpl=templates.find(t=>t.id===id);
  if (!tpl) return;
  const pid=activeProj.id;
  const existingNames = cols.map(c=>c.name.toLowerCase());
  const colInserts=(tpl.template_columns||[])
    .filter(c => !existingNames.includes(c.name.toLowerCase()))
    .map((c,i)=>({project_id:pid,name:c.name,position:cols.length+i}));
  if (!colInserts.length) { toast('Todas as colunas do modelo já existem no projeto','err'); return; }
  const {data:newCols}=await db.from('columns').insert(colInserts).select();
  cols.push(...(newCols||[]));
  if (draws.length&&newCols?.length) {
    const taskInserts=[];
    for (const d of draws) for (const c of newCols) taskInserts.push({drawing_id:d.id,column_id:c.id,done:false});
    const {data:ts}=await db.from('tasks').insert(taskInserts).select();
    for (const t of (ts||[])) { if (!tasks[t.drawing_id]) tasks[t.drawing_id]={}; tasks[t.drawing_id][t.column_id]=t; }
  }
  closeTpl();
  renderAll();
  toast(`Modelo "${tpl.name}" aplicado!`,'ok');
}

// ── EXPORT PDF ──
function exportPDF() {
  const p = activeProj;
  const totalPends = Object.values(pendencias).reduce((a,arr)=>a+arr.length,0);
  const total = draws.length*cols.length;
  const done  = Object.values(tasks).reduce((a,m)=>a+Object.values(m).filter(t=>t.done).length,0);
  const pct   = total>0?Math.round(done/total*100):0;

  // build matrix rows
  const matrixRows = draws.map(d=>{
    const pds = pendencias[d.id]||[];
    const cells = cols.map(c=>{
      const t = tasks[d.id]?.[c.id];
      return `<td style="text-align:center;border:1px solid #ccc;padding:6px">${t?.done?'✓':''}</td>`;
    }).join('');
    const pendBadge = pds.length>0?`<span style="display:inline-block;background:#f97316;color:#fff;border-radius:4px;font-size:9px;font-weight:700;padding:1px 5px;margin-left:4px">${pds.length}</span>`:'';
    return `<tr>
      <td style="border:1px solid #ccc;padding:6px 8px;font-weight:600;font-size:12px">
        ${d.code}${pendBadge}
        ${d.due_date?`<div style="font-size:10px;color:#666;margin-top:2px">📅 ${fmtDate(d.due_date)}</div>`:''}
      </td>
      ${cells}
    </tr>`;
  }).join('');

  const colHeaders = cols.map(c=>`<th style="border:1px solid #ccc;padding:6px 8px;background:#f0f4f8;font-size:11px;text-align:center;white-space:nowrap">${c.name}</th>`).join('');

  // build backlog
  const blRows = backlog.map(b=>{
    const pds = pendencias[b.id]||[];
    const pendBadge = pds.length>0?`<span style="display:inline-block;background:#f97316;color:#fff;border-radius:4px;font-size:9px;font-weight:700;padding:1px 5px;margin-left:4px">${pds.length}</span>`:'';
    return `<tr>
      <td style="border:1px solid #ccc;padding:6px 8px;font-size:12px">
        <span style="${b.done?'text-decoration:line-through;color:#999':''}">${b.text}</span>${pendBadge}
        ${b.due_date?`<span style="font-size:10px;color:#666;margin-left:8px">📅 ${fmtDate(b.due_date)}</span>`:''}
      </td>
      <td style="border:1px solid #ccc;padding:6px 8px;text-align:center;font-size:12px">${b.done?'✓':'—'}</td>
    </tr>`;
  }).join('');

  // build pendencias list
  const allPends = [];
  for (const d of draws) {
    const pds = pendencias[d.id]||[];
    for (const pd of pds) allPends.push({ref: d.code, desc: pd.descricao});
  }
  for (const b of backlog) {
    const pds = pendencias[b.id]||[];
    for (const pd of pds) allPends.push({ref: b.text, desc: pd.descricao});
  }

  const pendRows = allPends.map((pd,i)=>`
    <tr>
      <td style="border:1px solid #ccc;padding:6px 8px;font-size:11px;color:#666">${pd.ref}</td>
      <td style="border:1px solid #ccc;padding:6px 8px;font-size:12px">${pd.desc}</td>
    </tr>`).join('');

  const html = `<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>${p.name} — Relatório</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; color: #1a1a1a; background: #fff; padding: 20px; }
  @page { size: A4; margin: 15mm; }
  @media print { body { padding: 0; } .no-print { display: none; } }

  .header { display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid #1a6fd4; padding-bottom: 12px; margin-bottom: 18px; }
  .header-left h1 { font-size: 20px; font-weight: 800; color: #1a6fd4; }
  .header-left p  { font-size: 11px; color: #666; margin-top: 2px; }
  .header-right   { font-size: 11px; color: #666; text-align: right; }
  .logo-mark      { font-size: 13px; font-weight: 800; color: #1a6fd4; }

  .stats { display: flex; gap: 10px; margin-bottom: 20px; }
  .stat  { flex: 1; border: 1px solid #ddd; border-radius: 6px; padding: 10px 12px; }
  .stat-val { font-size: 20px; font-weight: 800; color: #1a6fd4; }
  .stat-lbl { font-size: 9px; color: #999; text-transform: uppercase; letter-spacing: .06em; }

  .section-title { font-size: 13px; font-weight: 800; text-transform: uppercase; letter-spacing: .06em; color: #1a6fd4; margin: 18px 0 8px; border-left: 3px solid #1a6fd4; padding-left: 8px; }

  table { width: 100%; border-collapse: collapse; font-size: 12px; margin-bottom: 6px; }
  th    { background: #f0f4f8; border: 1px solid #ccc; padding: 7px 8px; font-size: 11px; font-weight: 700; }
  td    { border: 1px solid #ccc; padding: 6px 8px; vertical-align: middle; }
  tr:nth-child(even) td { background: #fafafa; }

  .pend-badge { display: inline-block; background: #f97316; color: #fff; border-radius: 4px; font-size: 9px; font-weight: 700; padding: 1px 5px; margin-left: 4px; }
  .footer { margin-top: 24px; padding-top: 10px; border-top: 1px solid #ddd; font-size: 10px; color: #aaa; display: flex; justify-content: space-between; }

  .print-btn { position: fixed; bottom: 24px; right: 24px; padding: 12px 24px; background: #1a6fd4; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 700; cursor: pointer; box-shadow: 0 4px 12px rgba(0,0,0,.2); }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo-mark">GRISA ENGENHARIA</div>
    <h1>${p.name}</h1>
    <p>${p.code||''} · Gerado em ${new Date().toLocaleDateString('pt-BR')} às ${new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}</p>
  </div>
  <div class="header-right">
    <div>${draws.length} desenhos</div>
    <div>${done}/${total} tarefas concluídas</div>
    <div style="color:#f97316;font-weight:700">${totalPends} pendência${totalPends!==1?'s':''}</div>
  </div>
</div>

<div class="stats">
  <div class="stat"><div class="stat-val">${draws.length}</div><div class="stat-lbl">Desenhos</div></div>
  <div class="stat"><div class="stat-val">${done}/${total}</div><div class="stat-lbl">Tarefas feitas</div></div>
  <div class="stat"><div class="stat-val">${backlog.filter(b=>!b.done).length}</div><div class="stat-lbl">Backlog pendente</div></div>
  <div class="stat"><div class="stat-val">${pct}%</div><div class="stat-lbl">Progresso</div></div>
  <div class="stat"><div class="stat-val" style="color:#f97316">${totalPends}</div><div class="stat-lbl">Pendências</div></div>
</div>

<div class="section-title">Matriz de Desenhos × Tarefas</div>
<table>
  <thead><tr>
    <th style="text-align:left;min-width:120px">Desenho</th>
    ${colHeaders}
  </tr></thead>
  <tbody>${matrixRows}</tbody>
</table>

${backlog.length?`
<div class="section-title">Backlog — Tarefas Gerais</div>
<table>
  <thead><tr>
    <th style="text-align:left">Tarefa</th>
    <th style="width:60px;text-align:center">Status</th>
  </tr></thead>
  <tbody>${blRows}</tbody>
</table>`:''}

${allPends.length?`
<div class="section-title" style="color:#f97316;border-left-color:#f97316">⚠ Pendências em Aberto (${allPends.length})</div>
<table>
  <thead><tr>
    <th style="text-align:left;width:180px">Referência</th>
    <th style="text-align:left">Descrição da Pendência</th>
  </tr></thead>
  <tbody>${pendRows}</tbody>
</table>`:''}

<div class="footer">
  <span>Grisa Engenharia — BIM Manager</span>
  <span>${p.name} · ${new Date().toLocaleDateString('pt-BR')}</span>
</div>

<button class="print-btn no-print" onclick="window.print()">🖨️ Imprimir / Salvar PDF</button>
</body>
</html>`;

  const win = window.open('','_blank');
  win.document.write(html);
  win.document.close();
}

async function concluirProject(id) {
  if (!confirm('Marcar projeto como concluído? Ele será movido para a aba Concluídos.')) return;
  await db.from('projects').update({status:'concluido'}).eq('id',id);
  const p = projects.find(x=>x.id===id);
  if (p) p.status='concluido';
  if (activeProj?.id===id) { activeProj=null; }
  renderSidebar();
  renderHome();
  toast('Projeto concluído!','ok');
}

// ── PENDENCIAS ──
function openPend(type, id, label) {
  activePend = {type, id};
  document.getElementById('pendTitle').textContent = label;
  document.getElementById('pendOverlay').classList.add('open');
  document.getElementById('pendInput').value='';
  renderPendList();
  setTimeout(()=>document.getElementById('pendInput')?.focus(), 80);
}

function closePend() {
  document.getElementById('pendOverlay').classList.remove('open');
  activePend = {type:null, id:null};
}

function renderPendList() {
  const list = pendencias[activePend.id]||[];
  const el = document.getElementById('pendList');
  if (!list.length) { el.innerHTML=`<div class="pend-empty">Nenhuma pendência cadastrada.</div>`; return; }
  el.innerHTML = list.map(p=>`
    <div class="pend-item">
      <span class="pend-item-text">${esc(p.descricao)}</span>
      <button class="pend-item-del" onclick="delPend('${p.id}')">×</button>
    </div>`).join('');
}

async function addPend() {
  const desc = document.getElementById('pendInput')?.value?.trim();
  if (!desc) return;
  const {data:p} = await db.from('pendencias').insert({ref_type:activePend.type, ref_id:activePend.id, descricao:desc}).select().single();
  if (!pendencias[activePend.id]) pendencias[activePend.id]=[];
  pendencias[activePend.id].push(p);
  document.getElementById('pendInput').value='';
  renderPendList();
  // update button in page without full re-render
  updatePendBtn(activePend.id);
  toast('Pendência adicionada','ok');
}

async function delPend(id) {
  const pend = (pendencias[activePend.id]||[]).find(p=>p.id===id);
  if (!confirm(`Remover a pendência:\n"${pend?.descricao}"?`)) return;
  await db.from('pendencias').delete().eq('id',id);
  const refId = activePend.id;
  pendencias[refId] = (pendencias[refId]||[]).filter(p=>p.id!==id);
  renderPendList();
  updatePendBtn(refId);
}

function updatePendBtn(refId) {
  // update all pend buttons for this ref without full re-render
  const pds = pendencias[refId]||[];
  const hasPend = pds.length>0;
  document.querySelectorAll(`[data-pend-id="${refId}"]`).forEach(btn=>{
    btn.className=`pend-btn ${hasPend?'active':''}`;
    btn.innerHTML=`!${hasPend?`<span class="pend-count">${pds.length}</span>`:''}`;
  });
  // fallback: re-render matrix/backlog sections only
  renderAll();
}

document.getElementById('pendOverlay').addEventListener('click',e=>{ if(e.target.id==='pendOverlay') closePend(); });
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closePend(); });
function fmtDate(d) { if (!d) return ''; const clean=d.substring(0,10); const [y,m,day]=clean.split('-'); return `${day}/${m}/${y}`; }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function toast(msg,type='') { const el=document.getElementById('toast'); el.textContent=msg; el.className=`toast ${type} show`; setTimeout(()=>el.classList.remove('show'),2500); }

// KEYBOARD
document.addEventListener('keydown',e=>{
  if (e.key==='Enter'&&document.getElementById('overlay').classList.contains('open')) confirmModal();
  if (e.key==='Escape') { closeModal(); closeTpl(); }
});
document.getElementById('overlay').addEventListener('click',e=>{ if (e.target.id==='overlay') closeModal(); });
document.getElementById('tplOverlay').addEventListener('click',e=>{ if (e.target.id==='tplOverlay') closeTpl(); });

boot();
</script>
